<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#1a0d00"/>
  <!-- Chest body (bottom) -->
  <rect x="12" y="52" width="76" height="36" rx="6" fill="#8B4513"/>
  <rect x="14" y="54" width="72" height="32" rx="5" fill="#A0522D"/>
  <!-- Chest lid (top arc) -->
  <rect x="12" y="30" width="76" height="26" rx="6" fill="#8B4513"/>
  <rect x="14" y="32" width="72" height="22" rx="5" fill="#A0522D"/>
  <!-- Lid arc highlight -->
  <ellipse cx="50" cy="32" rx="36" ry="8" fill="#C06030"/>
  <!-- Gold band on lid -->
  <rect x="12" y="52" width="76" height="6" rx="0" fill="#D4A017"/>
  <!-- Gold straps on body -->
  <rect x="28" y="58" width="6" height="24" rx="2" fill="#D4A017"/>
  <rect x="66" y="58" width="6" height="24" rx="2" fill="#D4A017"/>
  <!-- Gold strap on lid left/right -->
  <rect x="28" y="32" width="6" height="20" rx="2" fill="#D4A017"/>
  <rect x="66" y="32" width="6" height="20" rx="2" fill="#D4A017"/>
  <!-- Lock plate -->
  <rect x="42" y="50" width="16" height="14" rx="3" fill="#D4A017"/>
  <!-- Lock keyhole -->
  <circle cx="50" cy="55" r="3" fill="#1a0d00"/>
  <rect x="48" y="56" width="4" height="5" rx="1" fill="#1a0d00"/>
  <!-- Sparkles -->
  <circle cx="20" cy="22" r="2" fill="#FFD700" opacity="0.9"/>
  <circle cx="80" cy="18" r="1.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="88" cy="28" r="1" fill="#FFD700" opacity="0.7"/>
</svg>
